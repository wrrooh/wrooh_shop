{% load thumbnail %}
{% for product in products %}
<div class="col">
    <a class="text-black text-decoration-none fs-4" href="{{ product.get_absolute_url }}">
        <div class="card shadow-sm h-100">
            {% thumbnail product.image "400x400" as im %}
            <img class="img-fluid h-100" alt="Responsive image" src="{{ im.url }}" />
            {% empty %}
            <div class="d-flex align-items-center justify-content-center bg-light" style="height: 200px;">
                <span class="text-muted">No image</span>
            </div>
            {% endthumbnail %}
            <div class="card-body">
                <p class="card-text">{{ product.name|capfirst }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <h5>$ {{ product.price }}</h5>
                    <button class="btn btn-sm btn-outline-secondary">Add to cart</button>
                </div>
            </div>
        </div>
    </a>
</div>
{% endfor %}
